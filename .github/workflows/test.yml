name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-client:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        react-version: [18, 19]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies (React 18)
        if: matrix.react-version == 18
        run: pnpm install --frozen-lockfile

      - name: Force React 19 via pnpm.overrides
        if: matrix.react-version == 19
        run: |
          # pnpm.overrides forces a single React version across the entire monorepo,
          # preventing duplicate React copies (which cause "Invalid hook call" crashes).
          node -e '
            const fs = require("fs");
            const pkg = JSON.parse(fs.readFileSync("package.json", "utf8"));
            pkg.pnpm = pkg.pnpm || {};
            pkg.pnpm.overrides = pkg.pnpm.overrides || {};
            pkg.pnpm.overrides.react = "^19.0.0";
            pkg.pnpm.overrides["react-dom"] = "^19.0.0";
            pkg.pnpm.overrides["@types/react"] = "^19.0.0";
            fs.writeFileSync("package.json", JSON.stringify(pkg, null, 2) + "\n");
          '
          pnpm install --no-frozen-lockfile

      - name: Run tests
        run: pnpm exec vitest run

      - name: Type check
        run: pnpm --filter @edgepod/client exec tsc --noEmit
