name: Server test

on:
  push:
    paths:
      - "packages/server/**"
      - ".github/workflows/server-test.yml"
  pull_request:
    paths:
      - "packages/server/**"
      - ".github/workflows/server-test.yml"

jobs:
  test-server:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.2

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run server tests
        run: pnpm --filter @edgepod/server exec vitest run

      - name: Type check
        run: pnpm --filter @edgepod/server exec tsc --noEmit
