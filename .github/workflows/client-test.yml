name: Client test

on:
  push:
    paths:
      - "packages/client/**"
      - ".github/workflows/test.yml"
  pull_request:
    paths:
      - "packages/client/**"
      - ".github/workflows/test.yml"

jobs:
  test-client:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        react-version: [18, 19]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.2

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies (React 18)
        if: matrix.react-version == 18
        run: pnpm install --frozen-lockfile

      - name: Force React 19 via pnpm.overrides
        if: matrix.react-version == 19
        run: |
          # pnpm.overrides forces a single React version across the entire monorepo,
          # preventing duplicate React copies (which cause "Invalid hook call" crashes).
          jq '.pnpm.overrides.react = "^19.0.0" | .pnpm.overrides["react-dom"] = "^19.0.0" | .pnpm.overrides["@types/react"] = "^19.0.0"' package.json > package.json.tmp
          mv package.json.tmp package.json
          pnpm install --no-frozen-lockfile

      - name: Run tests
        run: pnpm exec vitest run

      - name: Type check
        run: pnpm --filter @edgepod/client exec tsc --noEmit
