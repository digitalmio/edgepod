name: OpenCode PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: anomalyco/opencode/github@latest
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_ZEN_API_KEY }}
        with:
          model: opencode-go/deepseek-v4-pro
          prompt: |
            You are a senior engineer reviewing a pull request for the EdgePod project.

            ## Project Rules
            - Files under 150 lines (soft), 200 lines hard limit
            - No default exports (except framework-required)
            - Never edit auto-generated files or shadcn/ui files
            - Avoid useEffect unless truly necessary
            - All packages use tsc --noEmit
            - Use named exports, neverthrow ResultAsync for async errors

            ## Review Instructions
            Be EXHAUSTIVE. Review the ENTIRE file, not just changed lines. Find ALL issues in one pass.

            Check:
            1. Bugs & correctness — logic errors, edge cases, race conditions, off-by-one
            2. Security — injection, auth bypass, data exposure, unsafe patterns
            3. Performance — N+1 queries, memory leaks, unnecessary re-renders
            4. TypeScript — proper types, avoid `any` in public APIs, null handling
            5. React — hooks rules, memoization, hydration issues
            6. Cross-file interactions — do changes work together? Are fixes complete?
            7. Project compliance — file length, exports, useEffect usage, TODO formatting

            ## Critical: One-Pass Completeness

            - If this PR addresses a previous review comment, verify the fix is COMPLETE and CORRECT on this first pass.
            - Do NOT report a new bug in a later review that you could have caught now by reading the fix carefully.
            - If a fix looks suspicious, incomplete, or introduces new problems — flag it immediately.
            - Ask yourself: "Will the developer need another round after fixing what I found?" If yes, you missed something.

            ## Output Format

            ### 🚫 Blocking (must fix before merge)
            Specific issue with exact file path and line number. Explain why + concrete fix.

            ### ⚠️ Non-blocking (should fix)
            Same format.

            ### ✅ Good patterns
            Praise specific decisions when you see them.

            ### Verdict
            Approve / Approve with minor fixes / Changes requested

            ## Rules
            - Find ALL issues. Do not stop after the first few obvious ones.
            - Reference exact line numbers.
            - Skip formatting/style — oxfmt and oxlint handle that.
            - If unsure, say so explicitly.
            - If solid, say so concisely. Don't manufacture issues.
